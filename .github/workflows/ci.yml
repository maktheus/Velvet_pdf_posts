name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/patadeveludo

jobs:
  # ────────────────────────────────────────────
  # 1. BACKEND — Lint, Unit Tests, Integration
  # ────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: patadeveludo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn test -Dspring.profiles.active=test -q

      - name: Run integration tests
        run: mvn verify -Dspring.profiles.active=integration-test -q
        env:
          DB_URL: jdbc:postgresql://localhost:5432/patadeveludo_test
          DB_USER: test
          DB_PASS: test
          JWT_SECRET: test-secret-at-least-32-chars-long
          MP_ACCESS_TOKEN: TEST_TOKEN
          MP_WEBHOOK_SECRET: TEST_WEBHOOK_SECRET

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Check coverage threshold (5%)
        run: mvn jacoco:check@check -q

  # ────────────────────────────────────────────
  # 2. FRONTEND — Lint, Unit Tests, Build
  # ────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-frontend-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST_KEY

  # ────────────────────────────────────────────
  # 3. ADMIN FRONTEND — Lint, Unit Tests, Build
  # ────────────────────────────────────────────
  admin-test:
    name: Admin Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-admin-${{ hashFiles('admin-frontend/package-lock.json') }}
          restore-keys: npm-admin-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  # ────────────────────────────────────────────
  # 4. E2E Tests (Playwright — store + checkout)
  # ────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: patadeveludo_e2e
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-frontend-

      - name: Start backend
        working-directory: backend
        run: |
          mvn spring-boot:run -Dspring-boot.run.profiles=e2e &
          echo "Waiting for backend..."
          timeout 90 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
        env:
          DB_URL: jdbc:postgresql://localhost:5432/patadeveludo_e2e
          DB_USER: e2e
          DB_PASS: e2e
          JWT_SECRET: e2e-secret-at-least-32-chars-long
          MP_ACCESS_TOKEN: TEST_TOKEN
          MP_WEBHOOK_SECRET: TEST_WEBHOOK

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm run build
          npm start &
          timeout 30 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ────────────────────────────────────────────
  # 5. Security scan
  # ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check (backend)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: pata-de-veludo-backend
          path: backend
          format: HTML
          args: --failOnCVSS 8

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/

  # ────────────────────────────────────────────
  # 6. Build Docker images (on success)
  # ────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, admin-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.patadeveludo.com.br/api

      - name: Build & push admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin-frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}-admin:latest
            ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}
