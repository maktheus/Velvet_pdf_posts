spring:
  jpa:
    show-sql: false
    properties:
      hibernate.format_sql: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.mutum.patadeveludo: INFO
    org.springframework.security: WARN
