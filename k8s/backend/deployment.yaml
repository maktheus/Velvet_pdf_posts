apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: patadeveludo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/stpedr/patadeveludo-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-secret
            - name: MP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mp-access-token
            - name: MP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mp-webhook-secret
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-password
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
